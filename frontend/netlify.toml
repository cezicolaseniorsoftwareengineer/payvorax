[build]
  # Use npm build script which runs the Node extractor. This ensures Netlify runs "npm install" then "npm run build".
  command = "npm run build"
  publish = "frontend/public"
  [build.environment]
  PYTHON_VERSION = "3.11"

[context.production.environment]
# FRONTEND_URL will be used by the backend (Render) to configure CORS.
# Set this in Render as: https://your-site.netlify.app
# FRONTEND_URL = "https://your-site.netlify.app"

[context.deploy-preview]
  # Use npm build script for deploy-preview as well to ensure consistent build steps.
  command = "npm run build"
  publish = "frontend/public"
