<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BioCodeTechPay</title>
    <!-- PWA -->
    <link rel="manifest" href="static/manifest.json">
    <meta name="theme-color" content="#1d4ed8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BioCodePay">
    <link rel="apple-touch-icon" href="static/img/logo.png">
    <!-- Open Graph — social media preview -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Bio Code Tech Pay">
    <meta property="og:title" content="Bio Code Tech Pay">
    <meta property="og:description" content="O sistema de pagamento mais inteligente que você verá.">
    <meta property="og:image" content="https://www.biotechpay.com.br/static/img/logo.png">
    <meta property="og:image:width" content="512">
    <meta property="og:image:height" content="512">
    <meta property="og:image:alt" content="Logo Bio Code Tech Pay">
    <meta property="og:url" content="https://www.biotechpay.com.br">
    <meta property="og:locale" content="pt_BR">
    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Bio Code Tech Pay">
    <meta name="twitter:description" content="O sistema de pagamento mais inteligente que você verá.">
    <meta name="twitter:image" content="https://www.biotechpay.com.br/static/img/logo.png">
    <!-- SEO -->
    <meta name="description" content="O sistema de pagamento mais inteligente que você verá.">
    <link rel="stylesheet" href="static/css/tailwind.min.css">
    <link rel="stylesheet" href="static/css/inter-font.css">
    <script src="static/js/lucide.min.js"></script>
    <style>
        html {
            background-color: #1d4ed8;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            touch-action: pan-x pan-y;
            /* Disables double-tap zoom */
            height: 100vh;
            height: 100dvh;
            /* dynamic viewport: excludes browser chrome on mobile */
            overflow: hidden;
        }

        .nu-purple {
            background-color: #1d4ed8;
        }

        .nu-purple-dark {
            background-color: #1e40af;
        }

        .nu-text-purple {
            color: #1d4ed8;
        }

        .card-hover:hover {
            transform: translateY(-2px);
            transition: all 0.2s;
        }

        .privacy-hidden {
            color: #000 !important;
            letter-spacing: 2px;
            font-family: monospace;
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        ::-webkit-scrollbar {
            display: none;
        }

        /* Hide scrollbar for IE, Edge and Firefox */
        html,
        body,
        main {
            -ms-overflow-style: none;
            /* IE and Edge */
            scrollbar-width: none;
            /* Firefox */
        }

        /* --- Optimistic UI: instant feedback layer --- */
        .pvx-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(255, 255, 255, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease;
        }

        .pvx-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .pvx-spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #e5e7eb;
            border-top-color: #1d4ed8;
            border-radius: 50%;
            animation: pvx-spin 0.6s linear infinite;
        }

        @keyframes pvx-spin {
            to {
                transform: rotate(360deg);
            }
        }

        .pvx-overlay-msg {
            margin-top: 12px;
            font-size: 14px;
            color: #374151;
            font-weight: 500;
        }

        /* Skeleton shimmer for data loading */
        .pvx-skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: pvx-shimmer 1.2s infinite;
            border-radius: 6px;
            min-height: 1.2em;
        }

        @keyframes pvx-shimmer {
            0% {
                background-position: 200% 0
            }

            100% {
                background-position: -200% 0
            }
        }

        /* Toast notification */
        .pvx-toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            z-index: 10000;
            opacity: 0;
            transition: opacity 0.2s ease, transform 0.2s ease;
            pointer-events: none;
        }

        .pvx-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(-8px);
        }

        .pvx-toast.success {
            background: #065f46;
            color: white;
        }

        .pvx-toast.error {
            background: #991b1b;
            color: white;
        }

        .pvx-toast.info {
            background: #1e40af;
            color: white;
        }
    </style>
</head>

<body class="bg-gray-100 flex flex-col">

    <!-- Optimistic UI: full-screen loading overlay -->
    <div id="pvx-overlay" class="pvx-overlay">
        <div class="pvx-spinner"></div>
        <p class="pvx-overlay-msg" id="pvx-overlay-msg">Processando...</p>
    </div>
    <!-- Toast notifications -->
    <div id="pvx-toast" class="pvx-toast"></div>

    <!-- Mobile-first Header -->
    <header class="nu-purple text-white px-4 py-2 shadow-lg"
        style="position:fixed;top:0;left:0;width:100%;z-index:1000;">
        <div class="w-full max-w-md md:max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2.5">
                <img src="/static/img/logo.png?v=logo3" alt="BioCodeTechPay"
                    class="w-11 h-11 md:w-14 md:h-14 rounded-full object-cover shadow-md">
                <span class="font-semibold text-base md:text-lg" id="user-greeting">Olá, {{ user_name.split(' ')[0] if
                    user_name else
                    'Cliente' }}</span>
            </div>
            <div class="flex gap-3">
                <i data-lucide="eye" id="toggle-balance"
                    class="w-5 h-5 md:w-6 md:h-6 cursor-pointer hover:text-gray-200 transition-colors"></i>
                <i data-lucide="help-circle" class="w-5 h-5 md:w-6 md:h-6 cursor-pointer hover:text-gray-200"></i>
                <i data-lucide="log-out" onclick="logout()"
                    class="w-5 h-5 md:w-6 md:h-6 cursor-pointer hover:text-gray-200"></i>
            </div>

    <!-- Main Content -->
    <main class="flex-grow min-h-0 w-full max-w-md md:max-w-6xl mx-auto px-4 pb-6 space-y-4 overflow-y-auto"
        style="padding-top:72px;">
        {% block content %}{% endblock %}
    </main>

    <!-- Bottom Navigation (App Style) -->
    <nav class="bg-white border-t border-gray-200 flex-shrink-0 px-4"
        style="padding-top:6px;padding-bottom:max(10px,env(safe-area-inset-bottom));">
        <div
            class="w-full max-w-md md:max-w-6xl mx-auto flex justify-between items-center text-gray-500 text-xs font-medium">
            <a href="/"
                class="flex flex-col items-center gap-1 hover:text-blue-700 {{ 'text-blue-700' if page == 'home' else '' }}">
                <i data-lucide="arrow-up-down" class="w-6 h-6"></i>
                <span>Transações</span>
            </a>
            <a href="/ui/pix"
                class="flex flex-col items-center gap-1 hover:text-blue-700 {{ 'text-blue-700' if page == 'pix' else '' }}">
                <i data-lucide="zap" class="w-6 h-6"></i>
                <span>Área Pix</span>
            </a>
            <a href="/ui/extrato"
                class="flex flex-col items-center gap-1 hover:text-blue-700 {{ 'text-blue-700' if page == 'extrato' else '' }}">
                <i data-lucide="list" class="w-6 h-6"></i>
                <span>Extrato</span>
            </a>
            <a href="/ui/boleto"
                class="flex flex-col items-center gap-1 hover:text-blue-700 {{ 'text-blue-700' if page == 'boleto' else '' }}">
                <i data-lucide="barcode" class="w-6 h-6"></i>
                <span>Pagar</span>
            </a>
            <a href="/ui/minha-conta"
                class="flex flex-col items-center gap-1 hover:text-blue-700 {{ 'text-blue-700' if page == 'minha_conta' else '' }}">
                <i data-lucide="user-circle" class="w-6 h-6"></i>
                <span>Minha Conta</span>
            </a>
        </div>
    </nav>

    <script>
        lucide.createIcons();

        // --- ZOOM PREVENTION LOGIC ---
        // 1. Prevent Ctrl + Scroll (Desktop Zoom)
        document.addEventListener('wheel', function (e) {
            if (e.ctrlKey) {
                e.preventDefault();
            }
        }, { passive: false });

        // 2. Prevent Ctrl + +/- Keys (Desktop Zoom)
        document.addEventListener('keydown', function (e) {
            if (e.ctrlKey && (
                e.key === '+' ||
                e.key === '-' ||
                e.key === '=' ||
                e.key === '0'
            )) {
                e.preventDefault();
            }
        });

        // 3. Prevent Pinch Zoom (Mobile/Tablet)
        document.addEventListener('touchmove', function (e) {
            if (e.touches.length > 1) {
                e.preventDefault();
            }
        }, { passive: false });

        // 4. Prevent Double Tap Zoom (Mobile/Tablet)
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function (e) {
            const now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, false);
        // -----------------------------

        // Balance Toggle Logic
        const toggleBtn = document.getElementById('toggle-balance');
        let isBalanceVisible = localStorage.getItem('balanceVisible') !== 'false'; // Default true

        function updateBalanceVisibility() {
            const sensitiveElements = document.querySelectorAll('.sensitive-data');

            sensitiveElements.forEach(el => {
                if (!el.dataset.original) {
                    el.dataset.original = el.innerText;
                }

                if (isBalanceVisible) {
                    el.innerText = el.dataset.original;
                    el.classList.remove('privacy-hidden');
                } else {
                    el.innerText = '******';
                    el.classList.add('privacy-hidden');
                }
            });

            if (toggleBtn) {
                if (isBalanceVisible) {
                    toggleBtn.setAttribute('data-lucide', 'eye');
                    toggleBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye w-6 h-6 cursor-pointer hover:text-gray-200 transition-colors"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>';
                } else {
                    toggleBtn.setAttribute('data-lucide', 'eye-off');
                    toggleBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye-off w-6 h-6 cursor-pointer hover:text-gray-200 transition-colors"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>';
                }
            }
        }

        if (toggleBtn) {
            toggleBtn.addEventListener('click', () => {
                isBalanceVisible = !isBalanceVisible;
                localStorage.setItem('balanceVisible', isBalanceVisible);
                updateBalanceVisibility();
            });
        }

        // Run on load
        // Wait for DOM content to be loaded to ensure elements are present
        document.addEventListener('DOMContentLoaded', updateBalanceVisibility);

        async function logout() {
            await fetch('/auth/logout', { method: 'POST' });
            localStorage.removeItem('user_name');
            window.location.href = '/login';
        }

        // === Optimistic UI Engine ===
        const PVX = {
            _currentBalance: null,
            overlay: document.getElementById('pvx-overlay'),
            overlayMsg: document.getElementById('pvx-overlay-msg'),
            toastEl: document.getElementById('pvx-toast'),
            _toastTimer: null,

            /** Show full-screen loading overlay with instant feedback */
            showOverlay(msg = 'Processando...') {
                this.overlayMsg.textContent = msg;
                this.overlay.classList.add('active');
            },

            /** Hide overlay */
            hideOverlay() {
                this.overlay.classList.remove('active');
            },

            /** Show a toast notification (success | error | info) */
            showToast(msg, type = 'success', duration = 3000) {
                clearTimeout(this._toastTimer);
                this.toastEl.textContent = msg;
                this.toastEl.className = `pvx-toast ${type} show`;
                this._toastTimer = setTimeout(() => {
                    this.toastEl.classList.remove('show');
                }, duration);
            },

            /**
             * Optimistic fetch: shows overlay instantly, executes request,
             * then shows toast with result. Returns the response.
             */
            async optimisticFetch(url, options = {}, optimisticMsg = 'Processando...') {
                this.showOverlay(optimisticMsg);
                try {
                    const response = await fetch(url, options);
                    this.hideOverlay();
                    return response;
                } catch (err) {
                    this.hideOverlay();
                    this.showToast('Erro de conexao. Tente novamente.', 'error');
                    throw err;
                }
            },

            /**
             * Fetches the latest balance from the server and updates all
             * .sensitive-data elements that contain a currency value (R$).
             * Safe to call at any time — fails silently if unauthenticated.
             */
            async refreshBalance() {
                try {
                    const token = localStorage.getItem('access_token');
                    const res = await fetch('/auth/balance', {
                        headers: token ? { 'Authorization': `Bearer ${token}` } : {},
                        credentials: 'same-origin'
                    });
                    if (!res.ok) return;
                    const data = await res.json();
                    const newBalance = Number(data.balance || 0);
                    this._currentBalance = newBalance;
                    const formatted = 'R$ ' + newBalance.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

                    // Update all visible balance elements on the page
                    document.querySelectorAll('.sensitive-data').forEach(el => {
                        const current = el.dataset.original || el.innerText;
                        if (current.includes('R$')) {
                            el.dataset.original = formatted;
                            const isHidden = el.classList.contains('privacy-hidden');
                            if (!isHidden) el.innerText = formatted;
                        }
                    });
                } catch (_) { /* silent — balance refresh is best-effort */ }
            }
        };

        // Database warm-up: silent health-check to wake Neon compute on page load.
        // This runs in the background so by the time the user interacts,
        // the database connection is already established (~500ms head start).
        (function warmUpDatabase() {
            fetch('/health', { method: 'GET', priority: 'low' }).catch(() => { });
        })();

        // Auto-logout: inactivity only (5min of no user interaction).
        // Tab/window visibility changes do NOT trigger logout — user navigates freely.
        // Redirect is silent: no error or warning message shown on the login page.
        (function setupAutoLogout() {
            var INACTIVITY_MS = 5 * 60 * 1000;
            var _timer = null;
            var _loggedOut = false;

            function _doLogout() {
                if (_loggedOut) return;
                _loggedOut = true;
                clearTimeout(_timer);
                fetch('/auth/logout', { method: 'POST', keepalive: true }).catch(function () { });
                localStorage.removeItem('user_name');
                window.location.replace('/login');
            }

            function _resetTimer() {
                clearTimeout(_timer);
                _timer = setTimeout(_doLogout, INACTIVITY_MS);
            }

            _resetTimer();

            ['mousemove', 'keydown', 'mousedown', 'click', 'scroll', 'touchstart', 'touchmove'].forEach(function (evt) {
                document.addEventListener(evt, _resetTimer, { passive: true, capture: true });
            });
        })();

        // Live balance polling: refresh every 5 seconds while the tab is visible.
        // Ensures deposits credited via webhook appear on the dashboard within 5s.
        // Pauses automatically when the tab is hidden to save network resources.
        (function setupBalancePolling() {
            var POLL_MS = 5000;
            var _pollId = null;

            function _start() {
                if (_pollId) return;
                _pollId = setInterval(function () { PVX.refreshBalance(); }, POLL_MS);
            }

            function _stop() {
                if (_pollId) { clearInterval(_pollId); _pollId = null; }
            }

            if (localStorage.getItem('access_token')) {
                _start();
                document.addEventListener('visibilitychange', function () {
                    if (document.hidden) { _stop(); } else { PVX.refreshBalance(); _start(); }
                });
            }
        })();
    </script>
    {% block scripts %}{% endblock %}

    <!-- ============================================================
         Bio Tech Pay Intelligence — Widget flutuante com efeito cosmico
    ============================================================ -->
    <style>
        #btpai-fab-wrapper {
            position: fixed;
            bottom: 90px;
            right: 20px;
            z-index: 9998;
            width: 56px;
            height: 56px;
        }

        #btpai-canvas {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            width: 120px;
            height: 120px;
        }

        #btpai-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.5);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            z-index: 2;
        }

        #btpai-btn:hover {
            transform: translate(-50%, -50%) scale(1.1);
            box-shadow: 0 6px 32px rgba(139, 92, 246, 0.65);
        }

        #btpai-btn svg {
            width: 22px;
            height: 22px;
            stroke: white;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        #btpai-tooltip {
            position: absolute;
            bottom: calc(100% + 14px);
            right: 0;
            background: rgba(10, 13, 17, 0.93);
            backdrop-filter: blur(10px);
            color: #e2e8f0;
            font-size: 11px;
            font-weight: 500;
            white-space: nowrap;
            padding: 5px 11px;
            border-radius: 8px;
            border: 1px solid rgba(139, 92, 246, 0.35);
            opacity: 0;
            transform: translateY(4px);
            transition: opacity 0.2s ease, transform 0.2s ease;
            pointer-events: none;
        }

        #btpai-fab-wrapper:hover #btpai-tooltip {
            opacity: 1;
            transform: translateY(0);
        }

        /* Modal overlay */
        #btpai-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 10001;
            align-items: flex-end;
            justify-content: flex-end;
            padding: 0 16px 90px 16px;
        }

        #btpai-modal.open {
            display: flex;
        }

        #btpai-panel {
            width: 100%;
            max-width: 380px;
            height: 530px;
            background: rgba(10, 13, 17, 0.97);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(139, 92, 246, 0.22);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 48px rgba(59, 130, 246, 0.07);
            overflow: hidden;
            animation: btpai-slide-up 0.28s ease;
        }

        @keyframes btpai-slide-up {
            from {
                opacity: 0;
                transform: translateY(18px) scale(0.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        #btpai-header {
            padding: 14px 18px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            gap: 11px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(139, 92, 246, 0.07));
            flex-shrink: 0;
        }

        #btpai-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        #btpai-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        #btpai-header-info h3 {
            color: #f1f5f9;
            font-size: 13px;
            font-weight: 600;
            line-height: 1.3;
            letter-spacing: 0.01em;
        }

        #btpai-header-info p {
            color: #10b981;
            font-size: 10px;
            font-weight: 500;
        }

        #btpai-close {
            margin-left: auto;
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            transition: color 0.15s;
            display: flex;
            align-items: center;
        }

        #btpai-close:hover {
            color: #f1f5f9;
        }

        #btpai-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 11px;
            scrollbar-width: thin;
            scrollbar-color: rgba(139, 92, 246, 0.25) transparent;
        }

        .btpai-msg {
            max-width: 86%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 12.5px;
            line-height: 1.55;
            word-break: break-word;
        }

        .btpai-msg.bot {
            background: rgba(255, 255, 255, 0.055);
            border: 1px solid rgba(255, 255, 255, 0.07);
            color: #e2e8f0;
            border-bottom-left-radius: 4px;
            align-self: flex-start;
        }

        .btpai-msg.user {
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            color: white;
            border-bottom-right-radius: 4px;
            align-self: flex-end;
        }

        .btpai-typing {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            border-bottom-left-radius: 4px;
        }

        .btpai-typing span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #8b5cf6;
            animation: btpai-bounce 1.2s infinite;
            box-shadow: 0 0 6px rgba(139, 92, 246, 0.5);
        }

        .btpai-typing span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .btpai-typing span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes btpai-bounce {

            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.4;
            }

            30% {
                transform: translateY(-7px);
                opacity: 1;
            }
        }

        #btpai-input-row {
            padding: 12px 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            gap: 8px;
            align-items: flex-end;
            flex-shrink: 0;
        }

        #btpai-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 10px 13px;
            color: #f1f5f9;
            font-size: 12.5px;
            font-family: 'Inter', sans-serif;
            resize: none;
            max-height: 96px;
            outline: none;
            transition: border-color 0.15s;
        }

        #btpai-input:focus {
            border-color: rgba(139, 92, 246, 0.5);
        }

        #btpai-input::placeholder {
            color: #475569;
        }

        #btpai-send {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: opacity 0.15s;
        }

        #btpai-send:disabled {
            opacity: 0.35;
            cursor: default;
        }

        #btpai-send svg {
            width: 15px;
            height: 15px;
            stroke: white;
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        #btpai-send.streaming {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        .btpai-stop-spinner {
            width: 18px;
            height: 18px;
            border: 2.5px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: btpai-spin 0.8s linear infinite;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btpai-stop-square {
            width: 7px;
            height: 7px;
            background: white;
            border-radius: 1px;
        }

        @keyframes btpai-spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }
    </style>

    <!-- Floating button + cosmic canvas -->
    <div id="btpai-fab-wrapper">
        <canvas id="btpai-canvas" width="120" height="120"></canvas>
        <button id="btpai-btn" aria-label="Bio Tech Pay Intelligence" onclick="btpaiOpen()">
            <svg viewBox="0 0 24 24">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
            </svg>
        </button>
        <div id="btpai-tooltip">Inteligência Financeira 24h</div>
    </div>

    <!-- Chat modal -->
    <div id="btpai-modal" onclick="btpaiBackdropClick(event)">
        <div id="btpai-panel">
            <div id="btpai-header">
                <div id="btpai-avatar"><img src="/static/img/logo.png?v=logo3" alt="Bio Code Tech Pay"></div>
                <div id="btpai-header-info">
                    <h3>Bio Tech Pay Intelligence</h3>
                    <p>&#9679; Online agora &mdash; Inteligência Financeira</p>
                </div>
                <button id="btpai-close" onclick="btpaiClose()" aria-label="Fechar">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>
            <div id="btpai-messages"></div>
            <div id="btpai-input-row">
                <textarea id="btpai-input" rows="1" placeholder="Pergunte sobre investimentos, finanças..."
                    onkeydown="btpaiKeydown(event)"></textarea>
                <button id="btpai-send" onclick="btpaiAction()" aria-label="Enviar">
                    <svg viewBox="0 0 24 24">
                        <line x1="22" y1="2" x2="11" y2="13" />
                        <polygon points="22 2 15 22 11 13 2 9 22 2" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // ---- Cosmic Particle Engine ----
        (function () {
            const canvas = document.getElementById('btpai-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const W = canvas.width, H = canvas.height;
            const cx = W / 2, cy = H / 2;
            const N = 32;
            const particles = Array.from({ length: N }, function (_, i) {
                return {
                    angle: (Math.PI * 2 * i / N) + Math.random() * 0.6,
                    radius: 28 + Math.random() * 22,
                    speed: 0.003 + Math.random() * 0.0045,
                    size: 0.7 + Math.random() * 1.5,
                    alpha: 0.25 + Math.random() * 0.65,
                    alphaDir: (Math.random() > 0.5 ? 1 : -1) * 0.007,
                    hue: Math.random() > 0.5 ? '139, 92, 246' : '59, 130, 246'
                };
            });

            function draw() {
                ctx.clearRect(0, 0, W, H);
                particles.forEach(function (p) {
                    p.angle += p.speed;
                    p.alpha += p.alphaDir;
                    if (p.alpha >= 0.95) { p.alpha = 0.95; p.alphaDir *= -1; }
                    if (p.alpha <= 0.12) { p.alpha = 0.12; p.alphaDir *= -1; }
                    const x = cx + Math.cos(p.angle) * p.radius;
                    const y = cy + Math.sin(p.angle) * p.radius;
                    const grd = ctx.createRadialGradient(x, y, 0, x, y, p.size * 3.5);
                    grd.addColorStop(0, 'rgba(' + p.hue + ', ' + p.alpha + ')');
                    grd.addColorStop(1, 'rgba(' + p.hue + ', 0)');
                    ctx.beginPath();
                    ctx.arc(x, y, p.size * 3.5, 0, Math.PI * 2);
                    ctx.fillStyle = grd;
                    ctx.fill();
                    const coreColor = p.hue === '59, 130, 246' ? '147, 197, 253' : '196, 181, 253';
                    ctx.beginPath();
                    ctx.arc(x, y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(' + coreColor + ', ' + p.alpha + ')';
                    ctx.fill();
                });
                requestAnimationFrame(draw);
            }
            draw();
        })();

        // ---- Bio Tech Pay Intelligence Chat State ----
        var _btpai = { history: [], busy: false, opened: false };

        function btpaiOpen() {
            document.getElementById('btpai-modal').classList.add('open');
            if (!_btpai.opened) {
                _btpai.opened = true;
                btpaiAddMsg('bot', 'Bem-vindo. Sou a inteligência financeira do Bio Tech Pay.\n\nAntes de qualquer conselho, preciso entender sua situação real. Vou te fazer 3 perguntas que vão montar o seu plano financeiro personalizado.\n\nPrimeira pergunta: Quanto você precisa por mês para pagar suas contas essenciais? Moradia, alimentação, água, luz, internet, transporte e tudo que não pode deixar de ser pago. Pode listar tudo, quanto mais detalhes melhor.');
            }
            setTimeout(function () {
                var inp = document.getElementById('btpai-input');
                if (inp) inp.focus();
            }, 120);
        }

        function btpaiClose() {
            document.getElementById('btpai-modal').classList.remove('open');
        }

        function btpaiBackdropClick(e) {
            if (e.target === document.getElementById('btpai-modal')) btpaiClose();
        }

        function btpaiAddMsg(role, text) {
            var container = document.getElementById('btpai-messages');
            var div = document.createElement('div');
            div.className = 'btpai-msg ' + role;
            div.innerHTML = text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return div;
        }

        function btpaiShowTyping() {
            var container = document.getElementById('btpai-messages');
            var el = document.createElement('div');
            el.className = 'btpai-typing';
            el.id = 'btpai-typing-indicator';
            el.innerHTML = '<span></span><span></span><span></span>';
            container.appendChild(el);
            container.scrollTop = container.scrollHeight;
        }

        function btpaiHideTyping() {
            var el = document.getElementById('btpai-typing-indicator');
            if (el) el.remove();
        }

        function btpaiKeydown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                btpaiAction();
            }
        }

        var _BTPAI_SEND_SVG = '<svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13" /><polygon points="22 2 15 22 11 13 2 9 22 2" /></svg>';

        function btpaiAction() {
            if (_btpai.busy) {
                btpaiStop();
            } else {
                btpaiSend();
            }
        }

        function btpaiStop() {
            if (!_btpai.controller) return;
            _btpai.stopped = true;
            _btpai.controller.abort();
        }

        function btpaiSetStopMode(active) {
            var btn = document.getElementById('btpai-send');
            if (active) {
                btn.disabled = false;
                btn.classList.add('streaming');
                btn.setAttribute('aria-label', 'Parar');
                btn.innerHTML = '<div class="btpai-stop-spinner"><div class="btpai-stop-square"></div></div>';
            } else {
                btn.classList.remove('streaming');
                btn.setAttribute('aria-label', 'Enviar');
                btn.innerHTML = _BTPAI_SEND_SVG;
                btn.disabled = false;
            }
        }

        async function btpaiSend() {
            if (_btpai.busy) return;
            var input = document.getElementById('btpai-input');
            var text = input.value.trim();
            if (!text) return;
            input.value = '';
            input.style.height = 'auto';
            btpaiAddMsg('user', text);
            _btpai.history.push({ role: 'user', content: text });
            _btpai.busy = true;
            _btpai.stopped = false;
            btpaiSetStopMode(true);
            btpaiShowTyping();
            var botDiv = null;
            var fullReply = '';
            try {
                var controller = new AbortController();
                _btpai.controller = controller;
                var timeoutId = setTimeout(function () { controller.abort(); }, 90000);
                var resp = await fetch('/ia/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    signal: controller.signal,
                    body: JSON.stringify({ messages: _btpai.history.slice(-20) })
                });
                if (!resp.ok) {
                    clearTimeout(timeoutId);
                    btpaiHideTyping();
                    var errData = await resp.json().catch(function () { return {}; });
                    if (resp.status === 403) {
                        btpaiAddMsg('bot', (errData.detail || 'Assine o plano para usar o gerente financeiro.') + '<br><br><a href="/ui/minha-conta" style="color:#3b82f6;text-decoration:underline;font-weight:600;">Ativar plano em Minha Conta</a>');
                    } else {
                        var errMsg = (errData && errData.detail) ? errData.detail : 'Servi\u00e7o temporariamente indispon\u00edvel. Tente novamente.';
                        btpaiAddMsg('bot', errMsg);
                    }
                    _btpai.history.pop();
                    return;
                }
                var reader = resp.body.getReader();
                var decoder = new TextDecoder();
                var sseBuf = '';
                var container = document.getElementById('btpai-messages');
                var firstToken = true;
                while (true) {
                    var chunk = await reader.read();
                    if (chunk.done) break;
                    sseBuf += decoder.decode(chunk.value, { stream: true });
                    var lines = sseBuf.split('\n');
                    sseBuf = lines.pop();
                    for (var i = 0; i < lines.length; i++) {
                        var line = lines[i].trim();
                        if (!line || line.indexOf('data: ') !== 0) continue;
                        var payload = line.substring(6);
                        try {
                            var evt = JSON.parse(payload);
                            if (evt.t) {
                                if (firstToken) {
                                    btpaiHideTyping();
                                    botDiv = btpaiAddMsg('bot', '');
                                    firstToken = false;
                                }
                                fullReply += evt.t;
                                botDiv.innerHTML = fullReply
                                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                                    .replace(/\n/g, '<br>');
                                container.scrollTop = container.scrollHeight;
                            }
                            if (evt.error && !fullReply) {
                                btpaiHideTyping();
                                botDiv = btpaiAddMsg('bot', '');
                                botDiv.innerHTML = evt.error;
                                firstToken = false;
                            }
                        } catch (e) { }
                    }
                }
                clearTimeout(timeoutId);
                btpaiHideTyping();
                if (fullReply) {
                    _btpai.history.push({ role: 'assistant', content: fullReply });
                } else {
                    if (botDiv) {
                        if (!botDiv.innerHTML) {
                            botDiv.innerHTML = 'N\u00e3o recebi resposta do servidor. Envie sua mensagem novamente.';
                        }
                    } else {
                        btpaiAddMsg('bot', 'N\u00e3o recebi resposta do servidor. Envie sua mensagem novamente.');
                    }
                    _btpai.history.pop();
                }
            } catch (err) {
                btpaiHideTyping();
                if (_btpai.stopped) {
                    if (fullReply) {
                        _btpai.history.push({ role: 'assistant', content: fullReply });
                    } else {
                        _btpai.history.pop();
                    }
                } else {
                    var errMsg = err.name === 'AbortError'
                        ? 'A resposta demorou mais do que o esperado. Tente enviar sua mensagem novamente.'
                        : 'Falha de conex\u00e3o. Verifique sua internet e tente novamente.';
                    if (botDiv) {
                        if (!botDiv.innerHTML) botDiv.innerHTML = errMsg;
                    } else {
                        btpaiAddMsg('bot', errMsg);
                    }
                    _btpai.history.pop();
                }
            } finally {
                _btpai.busy = false;
                _btpai.controller = null;
                btpaiSetStopMode(false);
            }
        }

        // Auto-resize textarea
        document.addEventListener('DOMContentLoaded', function () {
            var inp = document.getElementById('btpai-input');
            if (inp) {
                inp.addEventListener('input', function () {
                    this.style.height = 'auto';
                    this.style.height = Math.min(this.scrollHeight, 96) + 'px';
                });
            }
        });
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('/sw.js', { scope: '/' })
                    .catch(function (err) {
                        console.warn('Service Worker registration failed:', err);
                    });
            });
        }
    </script>
