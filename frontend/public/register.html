<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cadastro - BioCodeTechPay</title>
    <link rel="stylesheet" href="/static/css/tailwind.min.css">
    <link rel="stylesheet" href="/static/css/inter-font.css">
    <script src="/static/js/lucide.min.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .nu-purple {
            background-color: #1d4ed8;
        }

        .nu-text-purple {
            color: #1d4ed8;
        }
    </style>
</head>

<body class="bg-white min-h-screen flex flex-col">

    <div class="flex-grow flex flex-col items-center justify-center p-6">
        <div class="mb-8 text-center">
            <h1 class="text-2xl font-bold text-gray-900">Crie sua conta</h1>
            <p class="text-gray-500">Dados completos para ativacao da conta.</p>
        </div>

        <form id="registerForm" class="w-full max-w-sm space-y-4">

            <!-- Dados pessoais -->
            <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide pt-2">Dados pessoais</p>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nome Completo</label>
                <input type="text" id="nome" required
                    class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-600 outline-none"
                    placeholder="Seu nome completo">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">CPF ou CNPJ</label>
                <input type="text" id="cpf_cnpj" required inputmode="numeric"
                    class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-600 outline-none"
                    placeholder="000.000.000-00 ou 00.000.000/0001-00" maxlength="18">
                <div id="doc-feedback" class="mt-1 text-xs hidden"></div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
                <input type="email" id="email" required
                    class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-600 outline-none"
                    placeholder="seu@email.com">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Telefone (com DDD)</label>
                <input type="tel" id="phone" required inputmode="numeric"
                    class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-600 outline-none"
                    placeholder="(11) 99999-9999" maxlength="16">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                <div class="relative">
                    <input type="password" id="password" required
                        class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-600 outline-none"
                        placeholder="Minimo 6 caracteres">
                    <button type="button" onclick="togglePassword()"
                        class="absolute right-4 top-4 text-gray-400 hover:text-gray-600">
                        <i data-lucide="eye" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>

            <!-- Endereco -->
            <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide pt-2">Endereco</p>

            <div class="flex gap-2">
                <div class="flex-1">
                    <label class="block text-sm font-medium text-gray-700 mb-1">CEP</label>
                    <input type="text" id="address_zip" required inputmode="numeric"
                        class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-600 outline-none"
                        placeholder="00000-000" maxlength="9" oninput="formatCep(this)" onblur="fetchCep(this.value)">
                </div>
                <div id="cep-spinner" class="hidden self-end pb-4">
                    <div class="w-5 h-5 border-2 border-blue-600 border-t-transparent rounded-full animate-spin">
                    </div>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Logradouro</label>
                <input type="text" id="address_street" required
                    class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-600 outline-none"
                    placeholder="Rua, Avenida...">
            </div>

            <div class="flex gap-2">
                <div class="w-28">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Numero</label>
                    <input type="text" id="address_number" required
                        class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-600 outline-none"
                        placeholder="Ex: 42">
                </div>
                <div class="flex-1">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Complemento</label>
                    <input type="text" id="address_complement"
                        class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-600 outline-none"
                        placeholder="Apto, Bloco... (opcional)">
                </div>
            </div>

            <div class="flex gap-2">
                <div class="flex-1">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Cidade</label>
                    <input type="text" id="address_city" required
                        class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-600 outline-none"
                        placeholder="Cidade">
                </div>
                <div class="w-20">
                    <label class="block text-sm font-medium text-gray-700 mb-1">UF</label>
                    <input type="text" id="address_state" required maxlength="2"
                        class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-600 outline-none"
                        placeholder="SP">
                </div>
            </div>

            <button type="submit"
                class="w-full nu-purple text-white font-bold py-4 rounded-full hover:bg-blue-900 transition-all shadow-lg mt-4">
                Criar conta
            </button>
        </form>

        <p class="mt-6 text-center text-sm text-gray-600">
            Ja tem conta? <a href="/login" class="nu-text-purple font-semibold hover:underline">Fazer Login</a>
        </p>
    </div>

    <script>
        lucide.createIcons();

        function togglePassword() {
            const input = document.getElementById('password');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        // CPF/CNPJ real-time validation
        let docValidTimer = null;
        const docInput = document.getElementById('cpf_cnpj');
        const docFeedback = document.getElementById('doc-feedback');
        let docIsValid = false;

        function formatDoc(value) {
            const digits = value.replace(/\D/g, '');
            if (digits.length <= 11) {
                return digits
                    .replace(/(\d{3})(\d)/, '$1.$2')
                    .replace(/(\d{3})(\d)/, '$1.$2')
                    .replace(/(\d{3})(\d{1,2})$/, '$1-$2');
            } else {
                return digits
                    .replace(/(\d{2})(\d)/, '$1.$2')
                    .replace(/(\d{3})(\d)/, '$1.$2')
                    .replace(/(\d{3})(\d)/, '$1/$2')
                    .replace(/(\d{4})(\d{1,2})$/, '$1-$2');
            }
        }

        docInput.addEventListener('input', function () {
            const raw = this.value.replace(/\D/g, '');
            this.value = formatDoc(raw);
            docFeedback.className = 'mt-1 text-xs hidden';
            docFeedback.textContent = '';
            docIsValid = false;

            clearTimeout(docValidTimer);
            if (raw.length >= 11) {
                docValidTimer = setTimeout(() => validateDocumentLive(raw), 600);
            }
        });

        async function validateDocumentLive(digits) {
            try {
                const res = await fetch(`/auth/validar-documento?cpf_cnpj=${encodeURIComponent(digits)}`, {
                    method: 'POST'
                });
                const data = await res.json();
                docFeedback.classList.remove('hidden');
                if (data.valid) {
                    docIsValid = true;
                    docInput.classList.remove('border-red-400');
                    docInput.classList.add('border-green-500');
                    docFeedback.className = 'mt-1 text-xs text-green-600';
                    docFeedback.textContent = data.doc_type + ' valido';
                } else {
                    docIsValid = false;
                    docInput.classList.remove('border-green-500');
                    docInput.classList.add('border-red-400');
                    docFeedback.className = 'mt-1 text-xs text-red-500';
                    docFeedback.textContent = data.message;
                }
            } catch (_) {
                // network error: do not block submission, server will re-validate
            }
        }

        // Phone formatting
        const phoneInput = document.getElementById('phone');
        phoneInput.addEventListener('input', function () {
            let d = this.value.replace(/\D/g, '').slice(0, 11);
            if (d.length > 6) {
                d = d.replace(/^(\d{2})(\d{5})(\d{0,4})/, '($1) $2-$3');
            } else if (d.length > 2) {
                d = d.replace(/^(\d{2})(\d{0,5})/, '($1) $2');
            } else if (d.length > 0) {
                d = d.replace(/^(\d{0,2})/, '($1');
            }
            this.value = d;
        });

        // CEP formatting and ViaCEP auto-fill
        function formatCep(input) {
            let d = input.value.replace(/\D/g, '').slice(0, 8);
            if (d.length > 5) d = d.replace(/^(\d{5})(\d{0,3})/, '$1-$2');
            input.value = d;
        }

        async function fetchCep(cep) {
            const digits = cep.replace(/\D/g, '');
            if (digits.length !== 8) return;
            const spinner = document.getElementById('cep-spinner');
            spinner.classList.remove('hidden');
            try {
                const r = await fetch(`https://viacep.com.br/ws/${digits}/json/`);
                const d = await r.json();
                if (!d.erro) {
                    document.getElementById('address_street').value = d.logradouro || '';
                    document.getElementById('address_city').value = d.localidade || '';
                    document.getElementById('address_state').value = (d.uf || '').toUpperCase();
                    document.getElementById('address_number').focus();
                }
            } catch (_) { /* network error: user fills manually */ }
            finally { spinner.classList.add('hidden'); }
        }

        // Database warm-up on register page load
        fetch('/health', { method: 'GET', priority: 'low' }).catch(() => { });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const digits = docInput.value.replace(/\D/g, '');
            if (digits.length >= 11 && !docIsValid) {
                docFeedback.classList.remove('hidden');
                docFeedback.className = 'mt-1 text-xs text-red-500';
                docFeedback.textContent = 'Verifique o CPF ou CNPJ informado.';
                docInput.focus();
                return;
            }

            const phone = document.getElementById('phone').value.replace(/\D/g, '');
            if (phone.length < 10) {
                alert('Informe um telefone valido com DDD.');
                document.getElementById('phone').focus();
                return;
            }

            const zip = document.getElementById('address_zip').value.replace(/\D/g, '');
            if (zip.length !== 8) {
                alert('Informe um CEP valido com 8 digitos.');
                document.getElementById('address_zip').focus();
                return;
            }

            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.innerHTML = '<div class="flex items-center justify-center gap-2"><div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div><span>Criando conta...</span></div>';

            const complement = document.getElementById('address_complement').value.trim();
            const data = {
                name: document.getElementById('nome').value,
                cpf_cnpj: digits,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                phone: phone,
                address_street: document.getElementById('address_street').value.trim(),
                address_number: document.getElementById('address_number').value.trim(),
                address_complement: complement || null,
                address_city: document.getElementById('address_city').value.trim(),
                address_state: document.getElementById('address_state').value.trim().toUpperCase(),
                address_zip: zip
            };

            try {
                const response = await fetch('/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    const result = await response.json();

                    // No auto-login: session is only issued after email verification.
                    // Show the "check your email" screen regardless.
                    const form = document.getElementById('registerForm');
                    form.innerHTML = `
                        <div class="text-center py-8 px-4">
                            <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-blue-700" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                                </svg>
                            </div>
                            <h2 class="text-xl font-bold text-gray-900 mb-2">Verifique seu e-mail</h2>
                            <p class="text-gray-600 text-sm mb-4">
                                Enviamos um link de confirmacao para <strong>${data.email}</strong>.
                                Clique no link para ativar sua conta e acessar o sistema.
                            </p>
                            <p class="text-xs text-gray-400 mb-6">Nao recebeu? Verifique a pasta de spam ou aguarde alguns minutos.</p>
                            <a href="/login" class="inline-block nu-purple text-white font-bold py-3 px-8 rounded-full hover:bg-blue-900 transition-all">
                                Ir para o Login
                            </a>
                        </div>`;
                } else {
                    const err = await response.json();
                    alert('Erro: ' + err.detail);
                    btn.disabled = false;
                    btn.innerHTML = 'Criar conta';
                }
            } catch (error) {
                alert('Erro de conexao');
                btn.disabled = false;
                btn.innerHTML = 'Criar conta';
            }
        });
    </script>
</body>

</html>
