<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esqueci minha senha - BioCodeTechPay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .nu-purple {
            background-color: #1d4ed8;
        }

        .nu-text-purple {
            color: #1d4ed8;
        }
    </style>
</head>

<body class="bg-white min-h-[100dvh] flex flex-col">

    <div class="flex-grow flex flex-col items-center justify-center p-4 w-full">
        <div class="mb-6 text-center w-full max-w-md mx-auto">
            <a href="/login">
                <img src="/static/img/logo.png?v=logo3" alt="BioCodeTechPay Logo"
                    class="w-24 h-24 object-contain rounded-full mx-auto shadow-sm mb-4">
            </a>
            <h1 class="text-2xl font-bold text-gray-800">Esqueceu sua senha?</h1>
            <p class="text-sm text-gray-500 mt-1">Informe seu e-mail e enviaremos uma senha temporaria para redefinir
                sua senha.</p>
        </div>

        <div class="w-full max-w-sm space-y-4">
            <div id="successMsg"
                class="hidden bg-green-50 border border-green-200 rounded-xl p-4 text-sm text-green-800 text-center">
                Se o e-mail estiver cadastrado, você receberá as instruções em breve. Verifique sua caixa de entrada.
            </div>

            <form id="resetForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">E-mail cadastrado</label>
                    <input type="email" id="email" required
                        class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-600 outline-none transition-all"
                        placeholder="seuemail@exemplo.com">
                </div>

                <button type="submit"
                    class="w-full nu-purple text-white font-bold py-3 rounded-full hover:bg-blue-900 transition-all shadow-lg">
                    Enviar senha temporaria
                </button>
            </form>

            <p class="text-center text-sm text-gray-600">
                Lembrou a senha? <a href="/login" class="nu-text-purple font-semibold hover:underline">Entrar</a>
            </p>
        </div>
    </div>

    <footer class="w-full p-4 text-center text-xs text-gray-400 border-t border-gray-100 bg-white">
        <p>Todos os Direitos Reservados 2026 BioCodeTechPay</p>
    </footer>

    <script>
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<div class="flex items-center justify-center gap-2"><div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div><span>Enviando...</span></div>';

            try {
                const response = await fetch('/auth/esqueci-senha', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: document.getElementById('email').value })
                });

                const data = await response.json();

                if (response.ok) {
                    document.getElementById('resetForm').classList.add('hidden');
                    const successDiv = document.getElementById('successMsg');
                    successDiv.classList.remove('hidden');

                    // Demo fallback: RESEND_API_KEY not set — show temp password directly on screen
                    if (data.temp_password) {
                        const demoDiv = document.createElement('div');
                        demoDiv.className = 'mt-3 p-4 bg-purple-50 border-2 border-purple-400 rounded-xl text-center';
                        demoDiv.innerHTML =
                            '<p class="text-xs font-semibold text-purple-700 uppercase tracking-wide mb-2">Modo demo — e-mail nao configurado</p>' +
                            '<p class="text-xs text-gray-500 mb-2">Sua senha temporaria:</p>' +
                            '<p class="text-2xl font-bold tracking-widest text-purple-900 font-mono mb-3">' + data.temp_password + '</p>' +
                            '<a href="/redefinir-senha" class="inline-block bg-purple-700 text-white font-bold py-2 px-6 rounded-full text-sm hover:bg-purple-900 transition-all">Redefinir minha senha</a>';
                        successDiv.parentNode.insertBefore(demoDiv, successDiv.nextSibling);
                    }
                } else {
                    alert(data.detail || 'Erro ao processar solicitação. Tente novamente.');
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                }
            } catch {
                alert('Erro de conexão. Verifique sua internet.');
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });
    </script>
</body>

</html>
