<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - PayvoraX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .nu-purple {
            background-color: #820AD1;
        }

        .nu-text-purple {
            color: #820AD1;
        }
    </style>
</head>

<body class="bg-white min-h-screen flex flex-col">

    <div class="flex-grow flex flex-col items-center justify-center p-6">
        <div class="mb-8 text-center">
            <h1 class="text-2xl font-bold text-gray-900">Crie sua conta</h1>
            <p class="text-gray-500">Junte-se à revolução financeira.</p>
        </div>

        <form id="registerForm" class="w-full max-w-sm space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nome Completo</label>
                <input type="text" id="nome" required
                    class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-purple-500 outline-none"
                    placeholder="Seu nome">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">CPF ou CNPJ</label>
                <input type="text" id="cpf_cnpj" required inputmode="numeric"
                    class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-purple-500 outline-none"
                    placeholder="000.000.000-00 ou 00.000.000/0001-00" maxlength="18">
                <div id="doc-feedback" class="mt-1 text-xs hidden"></div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
                <input type="email" id="email" required
                    class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-purple-500 outline-none"
                    placeholder="seu@email.com">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                <div class="relative">
                    <input type="password" id="password" required
                        class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-purple-500 outline-none"
                        placeholder="Mínimo 6 caracteres">
                    <button type="button" onclick="togglePassword()"
                        class="absolute right-4 top-4 text-gray-400 hover:text-gray-600">
                        <i data-lucide="eye" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>

            <button type="submit"
                class="w-full nu-purple text-white font-bold py-4 rounded-full hover:bg-purple-800 transition-all shadow-lg mt-4">
                Cadastrar
            </button>
        </form>

        <p class="mt-6 text-center text-sm text-gray-600">
            Já tem conta? <a href="/login" class="nu-text-purple font-semibold hover:underline">Fazer Login</a>
        </p>
    </div>

    <script>
        lucide.createIcons();

        function togglePassword() {
            const input = document.getElementById('password');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        // CPF/CNPJ real-time validation
        let docValidTimer = null;
        const docInput = document.getElementById('cpf_cnpj');
        const docFeedback = document.getElementById('doc-feedback');
        let docIsValid = false;

        function formatDoc(value) {
            const digits = value.replace(/\D/g, '');
            if (digits.length <= 11) {
                return digits
                    .replace(/(\d{3})(\d)/, '$1.$2')
                    .replace(/(\d{3})(\d)/, '$1.$2')
                    .replace(/(\d{3})(\d{1,2})$/, '$1-$2');
            } else {
                return digits
                    .replace(/(\d{2})(\d)/, '$1.$2')
                    .replace(/(\d{3})(\d)/, '$1.$2')
                    .replace(/(\d{3})(\d)/, '$1/$2')
                    .replace(/(\d{4})(\d{1,2})$/, '$1-$2');
            }
        }

        docInput.addEventListener('input', function () {
            const raw = this.value.replace(/\D/g, '');
            this.value = formatDoc(raw);
            docFeedback.className = 'mt-1 text-xs hidden';
            docFeedback.textContent = '';
            docIsValid = false;

            clearTimeout(docValidTimer);
            if (raw.length >= 11) {
                docValidTimer = setTimeout(() => validateDocumentLive(raw), 600);
            }
        });

        async function validateDocumentLive(digits) {
            try {
                const res = await fetch(`/auth/validar-documento?cpf_cnpj=${encodeURIComponent(digits)}`, {
                    method: 'POST'
                });
                const data = await res.json();
                docFeedback.classList.remove('hidden');
                if (data.valid) {
                    docIsValid = true;
                    docInput.classList.remove('border-red-400');
                    docInput.classList.add('border-green-500');
                    docFeedback.className = 'mt-1 text-xs text-green-600';
                    docFeedback.textContent = data.doc_type + ' valido';
                } else {
                    docIsValid = false;
                    docInput.classList.remove('border-green-500');
                    docInput.classList.add('border-red-400');
                    docFeedback.className = 'mt-1 text-xs text-red-500';
                    docFeedback.textContent = data.message;
                }
            } catch (_) {
                // network error: do not block submission, server will re-validate
            }
        }

        // Database warm-up on register page load
        fetch('/health', { method: 'GET', priority: 'low' }).catch(() => { });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const digits = docInput.value.replace(/\D/g, '');
            if (digits.length >= 11 && !docIsValid) {
                docFeedback.classList.remove('hidden');
                docFeedback.className = 'mt-1 text-xs text-red-500';
                docFeedback.textContent = 'Verifique o CPF ou CNPJ informado.';
                docInput.focus();
                return;
            }

            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.innerHTML = '<div class="flex items-center justify-center gap-2"><div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div><span>Cadastrando...</span></div>';

            const data = {
                name: document.getElementById('nome').value,
                cpf_cnpj: digits,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch('/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    const result = await response.json();
                    localStorage.setItem('user_name', result.name);
                    localStorage.setItem('access_token', result.access_token);

                    if (result.email_verified === false) {
                        // Show email verification banner before redirect
                        const form = document.getElementById('registerForm');
                        form.innerHTML = `
                            <div class="text-center py-8 px-4">
                                <div class="w-16 h-16 bg-purple-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-purple-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                                    </svg>
                                </div>
                                <h2 class="text-xl font-bold text-gray-900 mb-2">Verifique seu e-mail</h2>
                                <p class="text-gray-600 text-sm mb-4">
                                    Enviamos um link de confirmacao para <strong>${data.email}</strong>.
                                    Clique no link para ativar sua conta.
                                </p>
                                <p class="text-xs text-gray-400 mb-6">Nao recebeu? Verifique a pasta de spam.</p>
                                <a href="/" class="inline-block nu-purple text-white font-bold py-3 px-8 rounded-full hover:bg-purple-800 transition-all">
                                    Ir para o painel
                                </a>
                            </div>`;
                    } else {
                        window.location.href = '/';
                    }
                } else {
                    const err = await response.json();
                    alert('Erro: ' + err.detail);
                    btn.disabled = false;
                    btn.innerHTML = 'Cadastrar';
                }
            } catch (error) {
                alert('Erro de conexao');
                btn.disabled = false;
                btn.innerHTML = 'Cadastrar';
            }
        });
    </script>
</body>

</html>
