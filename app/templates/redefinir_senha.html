<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha - Bio Code Tech Pay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .nu-purple {
            background-color: #1d4ed8;
        }

        .nu-text-purple {
            color: #1d4ed8;
        }
    </style>
</head>

<body class="bg-white min-h-[100dvh] flex flex-col">

    <div class="flex-grow flex flex-col items-center justify-center p-4 w-full">
        <div class="mb-6 text-center w-full max-w-md mx-auto">
            <a href="/login">
                <img src="/static/img/logo.png?v=logo3" alt="Bio Code Tech Pay Logo"
                    class="w-24 h-24 object-contain rounded-full mx-auto shadow-sm mb-4">
            </a>
            <h1 class="text-2xl font-bold text-gray-800">Redefinir senha</h1>
            <p class="text-sm text-gray-500 mt-1">Crie uma nova senha para sua conta.</p>
        </div>

        <div class="w-full max-w-sm space-y-4">
            <div id="errorMsg"
                class="hidden bg-red-50 border border-red-200 rounded-xl p-4 text-sm text-red-800 text-center"></div>
            <div id="successMsg"
                class="hidden bg-green-50 border border-green-200 rounded-xl p-4 text-sm text-green-800 text-center">
                Senha redefinida com sucesso! <a href="/login" class="font-bold underline">Clique aqui para entrar.</a>
            </div>

            <form id="resetForm" class="space-y-4">
                <input type="hidden" id="token" value="{{ token }}">

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nova senha</label>
                    <div class="relative">
                        <input type="password" id="new_password" required minlength="6"
                            class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-600 outline-none transition-all"
                            placeholder="Minimo 6 caracteres">
                        <button type="button" onclick="togglePass('new_password')"
                            class="absolute right-4 top-3 text-gray-400 hover:text-gray-600">
                            <i data-lucide="eye" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Confirmar nova senha</label>
                    <div class="relative">
                        <input type="password" id="confirm_password" required minlength="6"
                            class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-600 outline-none transition-all"
                            placeholder="Repita a nova senha">
                        <button type="button" onclick="togglePass('confirm_password')"
                            class="absolute right-4 top-3 text-gray-400 hover:text-gray-600">
                            <i data-lucide="eye" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>

                <button type="submit"
                    class="w-full nu-purple text-white font-bold py-3 rounded-full hover:bg-blue-900 transition-all shadow-lg">
                    Salvar nova senha
                </button>
            </form>

            <p class="text-center text-sm text-gray-600">
                <a href="/login" class="nu-text-purple font-semibold hover:underline">Voltar para o login</a>
            </p>
        </div>
    </div>

    <footer class="w-full p-4 text-center text-xs text-gray-400 border-t border-gray-100 bg-white">
        <p>Todos os Direitos Reservados 2026 Bio Code Tech Pay</p>
    </footer>

    <script>
        lucide.createIcons();

        function togglePass(fieldId) {
            const input = document.getElementById(fieldId);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        // Extract token from URL if not injected server-side
        const urlToken = new URLSearchParams(window.location.search).get('token');
        if (urlToken) document.getElementById('token').value = urlToken;

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const token = document.getElementById('token').value;
            const newPassword = document.getElementById('new_password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            const errorDiv = document.getElementById('errorMsg');
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;

            errorDiv.classList.add('hidden');

            if (!token) {
                errorDiv.textContent = 'Link invalido. Solicite um novo link de redefinicao.';
                errorDiv.classList.remove('hidden');
                return;
            }

            if (newPassword !== confirmPassword) {
                errorDiv.textContent = 'As senhas nao coincidem.';
                errorDiv.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<div class="flex items-center justify-center gap-2"><div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div><span>Salvando...</span></div>';

            try {
                const response = await fetch('/auth/redefinir-senha', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, new_password: newPassword })
                });

                const data = await response.json();

                if (response.ok) {
                    document.getElementById('resetForm').classList.add('hidden');
                    document.getElementById('successMsg').classList.remove('hidden');
                } else {
                    errorDiv.textContent = data.detail || 'Erro ao redefinir senha. O link pode ter expirado.';
                    errorDiv.classList.remove('hidden');
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                }
            } catch {
                errorDiv.textContent = 'Erro de conexao. Verifique sua internet.';
                errorDiv.classList.remove('hidden');
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });
    </script>
</body>

</html>
